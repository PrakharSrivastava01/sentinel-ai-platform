services:

  sentinelai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelai-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-SentinelAI}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - sentinelai-net

  sentinelai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.compose
    container_name: sentinelai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      sentinelai-backend:
        condition: service_healthy
    networks:
      - sentinelai-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinelai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - sentinelai-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentinelai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sentinelai-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sentinelai-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/compose/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - sentinelai-net

volumes:
  grafana-data:

networks:
  sentinelai-net:
    driver: bridge
