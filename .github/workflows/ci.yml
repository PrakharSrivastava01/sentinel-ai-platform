name: CI Pipeline

on:
    push:
        branches: [main]
        paths-ignore:
            - '*.md'
    pull_request:
        branches: [main]
        paths-ignore:
            - '*.md'
    workflow_dispatch:  
permissions:
    contents: read
    
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run tests
              run: |
                  pytest tests/
            
    sonarcloud:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: SonarCloud Scan
              uses: Sonarsource/sonarcloud-github-action@master
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  args: >
                      -Dsonar.projectKey=Heyyprakhar1_sentinel-ai-platform
                      -Dsonar.organization=heyyprakhar1
                      -Dsonar.sources=app
                      -Dsonar.tests=tests
                      -Dsonar.python.version=3.12

    docker-build:

        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  docker build -t sentinelai:ci .

    trivy-scan:
        needs: docker-build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Build Docker Image for scanning
              run: |
                docker build -t sentinelai:ai .

            - name: Run Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: sentinelai:ai
                format: 'table'
                exit-code: '1'
                severity: 'CRITICAL'
                ignore-unfixed: true