apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sentinelai-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - sentinelai-dev
  selector:
    matchLabels:
      app: sentinelai
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
