apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sentinelai-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: sentinelai.rules
      rules:
        - alert: SentinelAIHighCPU
          expr: sentinelai_cpu_usage_percent > 80
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "SentinelAI High CPU Usage"
            description: "CPU usage is {{ $value }}% — above 80% threshold"

        - alert: SentinelAIHighMemory
          expr: sentinelai_memory_usage_percent > 85
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "SentinelAI High Memory Usage"
            description: "Memory usage is {{ $value }}% — above 85% threshold"

        - alert: SentinelAIDown
          expr: up{job="dev-sentinelai-service"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "SentinelAI is DOWN"
            description: "SentinelAI pod has been unreachable for more than 1 minute"
