---
apiVersion: v1
kind: Namespace
metadata:
  name: sentinelai-frontend
  labels:
    app: sentinelai-dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-dashboard
  namespace: sentinelai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelai-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinelai-dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: dashboard
          image: sentinelai-dashboard:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-dashboard-service
  namespace: sentinelai-frontend
  labels:
    app: sentinelai-dashboard
spec:
  selector:
    app: sentinelai-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinelai-dashboard-ingress
  namespace: sentinelai-frontend
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: dashboard.sentinelai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinelai-dashboard-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinelai-dashboard-hpa
  namespace: sentinelai-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinelai-dashboard
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinelai-dashboard-pdb
  namespace: sentinelai-frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sentinelai-dashboard
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentinelai-dashboard-netpol
  namespace: sentinelai-frontend
spec:
  podSelector:
    matchLabels:
      app: sentinelai-dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - ports:
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sentinelai-dev
      ports:
        - protocol: TCP
          port: 80
