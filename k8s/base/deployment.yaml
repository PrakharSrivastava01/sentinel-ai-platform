apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai
  template:
    metadata:
      labels:
        app: sentinelai
    spec:
      containers:
        - name: sentinelai
          image: sentinelai:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: sentinelai-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
